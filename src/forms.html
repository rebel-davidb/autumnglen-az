<!--
  Form embeds note.

  All public-facing forms on this site are now ActiveDEMAND embeds, rendered at
  runtime from the ActiveDEMAND tracking script loaded in base.njk:

    Contact Us       — id 314128  (/contact/)
    Schedule a Tour  — id 314131  (/schedule-a-tour/)
    Floor Plan       — id 314873  (/floor-plans/ inquiry modal)
    RSVP             — id 314798  (/events/<slug>/)

  Submissions are captured by ActiveDEMAND, not Netlify Forms, so this file no
  longer needs to register static Netlify form stubs. It is kept (and still
  passed through by .eleventy.js) only as a pointer for anyone auditing the
  build. If Netlify Forms is ever reintroduced, add the hidden static stubs back
  here so they're detected at deploy time.
-->

<html>
<head><meta charset="utf-8"><title>Forms</title><meta name="robots" content="noindex"></head>
<body>
  <p>Forms on this site are delivered via ActiveDEMAND embeds. See the source comment for details.</p>
</body>
</html>
