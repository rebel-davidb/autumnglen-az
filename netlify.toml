# Netlify build configuration for Azalea Estates of Fayetteville
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command   = "npm run ci"
  publish   = "_site"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

# Netlify Forms detection is enabled by default via data-netlify attributes
# and the static form stub in src/forms.html (copied to output).

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Long cache for hashed/static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML should revalidate frequently
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# 404 fallback
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
